<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Alluz Tech NDA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080F1E;
      --bg-soft: #0E1729;
      --surface: #121C32;
      --cyan: #2EEAFF;
      --white: #F5F9FF;
      --muted: #6B7E9E;
      --dim: #3A4860;
      --line: rgba(46,234,255,0.12);
      --line-s: rgba(255,255,255,0.06);
      --error: #E74C3C;
      --success: #27AE60;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
    }

    /* Top bar */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--line-s);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-brand { font-size: 10px; letter-spacing: 2px; color: var(--cyan); text-transform: uppercase; font-weight: 500; }
    .topbar-title { font-size: 15px; font-weight: 600; color: var(--white); }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--dim);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-logout:hover { border-color: var(--error); color: var(--error); }

    /* Layout */
    .main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--line-s);
      border-radius: 10px;
      padding: 20px 24px;
    }
    .stat-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--cyan); }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
    }
    .search-wrap { position: relative; flex: 1; max-width: 360px; }
    .search-wrap input {
      width: 100%;
      padding: 10px 14px 10px 36px;
      background: var(--bg-soft);
      border: 1px solid var(--line-s);
      border-radius: 8px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
    }
    .search-wrap input:focus { outline: none; border-color: var(--cyan); }
    .search-wrap input::placeholder { color: var(--dim); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--line-s);
      border-radius: 10px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--bg-soft); }
    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--line-s);
    }
    td {
      padding: 13px 16px;
      font-size: 13px;
      color: var(--white);
      border-bottom: 1px solid var(--line-s);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(46,234,255,0.03); }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-pj { background: rgba(46,234,255,0.1); color: var(--cyan); border: 1px solid rgba(46,234,255,0.3); }
    .badge-pf { background: rgba(39,174,96,0.1); color: #27AE60; border: 1px solid rgba(39,174,96,0.3); }

    .btn-detail {
      background: transparent;
      border: 1px solid var(--dim);
      border-radius: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      padding: 5px 12px;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn-detail:hover { border-color: var(--cyan); color: var(--cyan); }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
    }
    .pag-btns { display: flex; gap: 8px; }
    .pag-btn {
      background: var(--surface);
      border: 1px solid var(--line-s);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: 0.2s;
    }
    .pag-btn:hover:not(:disabled) { border-color: var(--cyan); color: var(--cyan); }
    .pag-btn:disabled { opacity: 0.35; cursor: default; }

    /* Empty / loading */
    .table-empty {
      text-align: center;
      padding: 48px;
      color: var(--muted);
      font-size: 14px;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--line-s);
      border-radius: 12px;
      width: 100%;
      max-width: 620px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 32px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--white); }
    .modal-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .btn-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }
    .btn-close:hover { color: var(--white); }
    .detail-section { margin-bottom: 20px; }
    .detail-section-title {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      font-weight: 600;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
    }
    .detail-row {
      display: flex;
      gap: 12px;
      margin-bottom: 7px;
      font-size: 13px;
    }
    .detail-label { color: var(--muted); min-width: 170px; flex-shrink: 0; font-weight: 500; }
    .detail-value { color: var(--white); }

    @media (max-width: 700px) {
      .stats { grid-template-columns: 1fr; }
      .topbar { padding: 0 16px; }
      .main { padding: 20px 12px; }
      th, td { padding: 10px 10px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <div>
        <div class="topbar-brand">Alluz Tech</div>
        <div class="topbar-title">Painel NDA</div>
      </div>
    </div>
    <button class="btn-logout" id="btnLogout">Sair</button>
  </div>

  <div class="main">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total de NDAs</div>
        <div class="stat-value" id="statTotal">–</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pessoa Jurídica</div>
        <div class="stat-value" id="statPJ">–</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pessoa Física</div>
        <div class="stat-value" id="statPF">–</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar por nome, e-mail ou documento...">
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome / Razão Social</th>
            <th>CNPJ / CPF</th>
            <th>E-mail</th>
            <th>Tipo</th>
            <th>Cadastro</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="7" class="table-empty">Carregando...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="pagination">
      <span id="pagInfo">–</span>
      <div class="pag-btns">
        <button class="pag-btn" id="btnPrev" disabled>← Anterior</button>
        <button class="pag-btn" id="btnNext" disabled>Próximo →</button>
      </div>
    </div>
  </div>

  <!-- Modal detalhes -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modalTitle">Detalhes do Cliente</div>
          <div class="modal-sub" id="modalSub"></div>
        </div>
        <button class="btn-close" id="btnCloseModal">✕</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('nda_admin_token');
    if (!token) window.location.href = '/admin/login';

    let page = 1;
    let totalPages = 1;
    let searchTimer;

    function authHeaders() {
      return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
    }

    function formatDate(str) {
      if (!str) return '–';
      const d = new Date(str);
      return d.toLocaleDateString('pt-BR');
    }

    async function loadStats() {
      try {
        const r = await fetch('/api/admin/clientes?por_pagina=1', { headers: authHeaders() });
        if (r.status === 401) { localStorage.removeItem('nda_admin_token'); window.location.href = '/admin/login'; return; }
        const d = await r.json();
        document.getElementById('statTotal').textContent = d.total;
      } catch (_) {}

      try {
        const rPJ = await fetch('/api/admin/clientes?busca=&por_pagina=1000', { headers: authHeaders() });
        const dPJ = await rPJ.json();
        const pj = dPJ.data.filter(c => c.tipo_pessoa === 'PJ').length;
        const pf = dPJ.data.filter(c => c.tipo_pessoa === 'PF').length;
        document.getElementById('statPJ').textContent = pj;
        document.getElementById('statPF').textContent = pf;
      } catch (_) {}
    }

    async function loadClientes(busca = '', p = 1) {
      const body = document.getElementById('tableBody');
      body.innerHTML = '<tr><td colspan="7" class="table-empty">Carregando...</td></tr>';

      try {
        const r = await fetch(`/api/admin/clientes?busca=${encodeURIComponent(busca)}&pagina=${p}&por_pagina=20`, { headers: authHeaders() });
        if (r.status === 401) { localStorage.removeItem('nda_admin_token'); window.location.href = '/admin/login'; return; }
        const d = await r.json();

        totalPages = d.total_paginas;
        page = d.pagina;

        document.getElementById('pagInfo').textContent = `${d.data.length} de ${d.total} registros (página ${p} de ${totalPages || 1})`;
        document.getElementById('btnPrev').disabled = page <= 1;
        document.getElementById('btnNext').disabled = page >= totalPages;

        if (d.data.length === 0) {
          body.innerHTML = '<tr><td colspan="7" class="table-empty">Nenhum registro encontrado.</td></tr>';
          return;
        }

        body.innerHTML = d.data.map(c => `
          <tr>
            <td style="color:var(--muted)">#${c.id}</td>
            <td><strong>${escHtml(c.razao_social)}</strong></td>
            <td style="font-family:monospace;font-size:12px">${escHtml(c.cnpj_cpf)}</td>
            <td style="color:var(--muted)">${escHtml(c.email)}</td>
            <td><span class="badge badge-${c.tipo_pessoa.toLowerCase()}">${c.tipo_pessoa}</span></td>
            <td style="color:var(--muted)">${formatDate(c.created_at)}</td>
            <td><button class="btn-detail" data-id="${c.id}">Ver detalhes</button></td>
          </tr>
        `).join('');

        body.querySelectorAll('.btn-detail').forEach(btn => {
          btn.addEventListener('click', () => openModal(btn.dataset.id));
        });
      } catch (err) {
        body.innerHTML = '<tr><td colspan="7" class="table-empty">Erro ao carregar dados.</td></tr>';
      }
    }

    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function openModal(id) {
      try {
        const r = await fetch(`/api/admin/clientes/${id}`, { headers: authHeaders() });
        const c = await r.json();

        const meses = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

        document.getElementById('modalTitle').textContent = escHtml(c.razao_social);
        document.getElementById('modalSub').textContent = `${c.tipo_pessoa} · Cadastro: ${formatDate(c.created_at)}`;

        document.getElementById('modalBody').innerHTML = `
          <div class="detail-section">
            <div class="detail-section-title">Identificação</div>
            ${dr('Tipo', c.tipo_pessoa === 'PJ' ? 'Pessoa Jurídica' : 'Pessoa Física')}
            ${dr(c.tipo_pessoa === 'PJ' ? 'Razão Social' : 'Nome', c.razao_social)}
            ${dr(c.tipo_pessoa === 'PJ' ? 'CNPJ' : 'CPF', c.cnpj_cpf)}
            ${dr('Endereço', c.endereco)}
            ${dr('CEP', c.cep)}
          </div>
          ${c.tipo_pessoa === 'PJ' ? `
          <div class="detail-section">
            <div class="detail-section-title">Representante Legal</div>
            ${dr('Nome', c.representante)}
            ${dr('CPF', c.cpf_representante)}
            ${dr('Cargo', c.cargo)}
          </div>` : ''}
          <div class="detail-section">
            <div class="detail-section-title">Condições do Acordo</div>
            ${dr('Prazo de vigência', c.prazo_vigencia)}
            ${dr('Valor da multa', 'R$ ' + parseFloat(c.valor_multa).toLocaleString('pt-BR', {minimumFractionDigits:2}))}
            ${dr('Prazo não solicitação', c.prazo_nao_solicitacao)}
            ${dr('Plataforma assinatura', c.plataforma_assinatura || 'Não informada')}
          </div>
          <div class="detail-section">
            <div class="detail-section-title">Testemunhas</div>
            ${dr('Testemunha 1', c.testemunha1_nome + ' — ' + c.testemunha1_cpf)}
            ${dr('Testemunha 2', c.testemunha2_nome + ' — ' + c.testemunha2_cpf)}
          </div>
          <div class="detail-section">
            <div class="detail-section-title">Data e Contato</div>
            ${dr('Data de assinatura', formatDate(c.data_assinatura))}
            ${dr('E-mail', c.email)}
          </div>
        `;

        document.getElementById('modalOverlay').classList.add('visible');
      } catch (_) {}
    }

    function dr(label, value) {
      return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${escHtml(value || '–')}</span></div>`;
    }

    // Events
    document.getElementById('btnCloseModal').addEventListener('click', () => {
      document.getElementById('modalOverlay').classList.remove('visible');
    });
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalOverlay')) {
        document.getElementById('modalOverlay').classList.remove('visible');
      }
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        page = 1;
        loadClientes(e.target.value, 1);
      }, 350);
    });

    document.getElementById('btnPrev').addEventListener('click', () => {
      if (page > 1) loadClientes(document.getElementById('searchInput').value, page - 1);
    });
    document.getElementById('btnNext').addEventListener('click', () => {
      if (page < totalPages) loadClientes(document.getElementById('searchInput').value, page + 1);
    });

    document.getElementById('btnLogout').addEventListener('click', () => {
      localStorage.removeItem('nda_admin_token');
      window.location.href = '/admin/login';
    });

    // Init
    loadStats();
    loadClientes();
  </script>
</body>
</html>
