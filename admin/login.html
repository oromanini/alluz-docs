<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Alluz Tech NDA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #080F1E;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #121C32;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }
    /* Alluz Logo */
    .alluz-logo { display: flex; flex-direction: column; align-items: center; gap: 0; line-height: 1; text-decoration: none; margin: 0 auto 20px; }
    .alluz-logo-top { display: flex; align-items: flex-end; }
    .alluz-logo-wordmark { font-weight: 200; letter-spacing: -0.03em; line-height: 1; color: #F5F9FF; font-size: 28px; }
    .alluz-logo-node { width: 0.12em; height: 0.12em; border-radius: 50%; background: #00d4ff; box-shadow: 0 0 12px #00d4ff; margin-left: 0.06em; margin-bottom: 0.15em; flex-shrink: 0; font-size: 28px; animation: alluz-pulse 2.4s ease-in-out infinite; }
    .alluz-logo-bottom { display: flex; align-items: center; gap: 0.08em; margin-top: 0.06em; }
    .alluz-logo-bar { flex: 1; height: 1px; min-width: 1em; background: linear-gradient(90deg, #00d4ff, #0066ff); border-radius: 2px; font-size: 28px; }
    .alluz-logo-tech { font-weight: 800; font-size: 8px; letter-spacing: 0.35em; text-transform: uppercase; color: #F5F9FF; text-indent: 0.2em; }
    @keyframes alluz-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.55; transform: scale(0.85); } }
    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #F5F9FF;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #6B7E9E;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      background: #0E1729;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #F5F9FF;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #2EEAFF; }
    input::placeholder { color: #3A4860; }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 1.5px solid #2EEAFF;
      border-radius: 8px;
      color: #2EEAFF;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-login:hover { background: rgba(46,234,255,0.08); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      display: none;
      background: rgba(231,76,60,0.12);
      border: 1px solid rgba(231,76,60,0.3);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      color: #E74C3C;
      margin-top: 14px;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <a href="/" class="alluz-logo" aria-label="Alluz Tech">
      <div class="alluz-logo-top">
        <span class="alluz-logo-wordmark">Alluz</span>
        <span class="alluz-logo-node"></span>
      </div>
      <div class="alluz-logo-bottom">
        <span class="alluz-logo-bar"></span>
        <span class="alluz-logo-tech">Tech</span>
      </div>
    </a>
    <h1>Painel Administrativo</h1>

    <div class="form-group">
      <label for="username">Usuário</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btnLogin">Entrar</button>
    <div class="error-msg" id="errorMsg">Usuário ou senha inválidos.</div>
  </div>

  <script>
    const btn = document.getElementById('btnLogin');
    const errorMsg = document.getElementById('errorMsg');

    async function login() {
      errorMsg.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('nda_admin_token', data.token);
          window.location.href = '/admin/dashboard';
        } else {
          errorMsg.textContent = data.error || 'Credenciais inválidas.';
          errorMsg.classList.add('visible');
        }
      } catch (_) {
        errorMsg.textContent = 'Erro de conexão. Tente novamente.';
        errorMsg.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }

    btn.addEventListener('click', login);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
