name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: docs-center-alluz-tech
  REGION: us-central1
  SERVICE: nda-form
  IMAGE: us-central1-docker.pkg.dev/docs-center-alluz-tech/alluz-docs/nda-form
  SA_EMAIL: github-actions@docs-center-alluz-tech.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --memory=1Gi
            --cpu=1
            --min-instances=0
            --max-instances=2
            --timeout=60
            --concurrency=10
          env_vars: |
            NODE_ENV=production
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=3306
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            SMTP_HOST=smtp.hostinger.com
            SMTP_PORT=465
            SMTP_SECURE=true
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            EMAIL_CC=nda@alluz.tech
            EMAIL_FROM=Alluz Tech <nda@alluz.tech>
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=8h
            ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
            ADMIN_PASSWORD_HASH=${{ secrets.ADMIN_PASSWORD_HASH }}
            DOCUSEAL_API_KEY=${{ secrets.DOCUSEAL_API_KEY }}
            PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
            PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium